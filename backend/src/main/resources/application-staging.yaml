server:
  port: 8080
  front-end-url: https://ris-portal.dev.ds4g.net/
  cms-url: https://ris-cm.staging.tech.digitalservice.dev/
  technical-users: []

spring:
  config:
    import:
      - "kubernetes:"
      - "optional:configtree:/etc/secrets/*/"
  cloud:
    kubernetes:
      config:
        fail-fast: true
        sources:
          - name: ris-search-opensearch-config
          - name: ris-search-postgres-config

swagger:
  server:
    url: https://ris-portal.dev.ds4g.net/
    description: Public staging server

sentry:
  traces-sample-rate: 0.01
  logging:
    minimum-event-level: error

logging:
  level:
    de:
      bund:
        digitalservice:
          ris:
            search:
              config:
                httplogs: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

s3:
  file-storage:
    case-law:
      versionPrefix: "V1/"
