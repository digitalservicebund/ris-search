spring:
  jpa:
    properties:
      hibernate:
        ddl-auto: none
  datasource:
    hikari:
      connection-test-query: SELECT 1 FROM DUAL
      connection-timeout: 600000
      maximum-pool-size: 500
      max-lifetime: 1800000
      minimum-idle: 20
      validation-timeout: 3000
      idle-timeout: 60000

server:
  port: 8090
  front-end-url: "http://localhost:3000/"
  docs-url: "https://localhost::5173/"
  cms-url: ""
  api-keys: []

rate-limit:
  default:
    requests: 600
    seconds: 60
  feedback:
    requests: 5
    seconds: 60

swagger:
  server:
    url: http://localhost:8090
    description: Local development server

springdoc:
  swagger-ui:
    supportedSubmitMethods: ["get"]
    defaultModelsExpandDepth: -1

opensearch:
  host: "${OPENSEARCH_HOST:localhost}"
  port: 9200
  username: ""
  password: ""
  articles-index-name: articles
  norms-index-name: norms
  caselaws-index-name: caselaws
  literature-index-name: literature
  documents-alias-name: documents
  administrative-directive-index-name: administrative_directive
  authentication: disabled

# The user and password to access postgres was created in the neuris-infra following the variable convention in that repo
search:
  database:
    host: "${POSTGRES_CASELAW_HOST:localhost}"
    port: 5432
    user: "test"
    password: "test"
    database: "neuris"

s3:
  file-storage:
    norm:
      endpoint: "https://object.storage.eu01.onstackit.cloud"
      bucket-name: norm
      access-key-id:
      secret-access-key:
      versionPrefix:
    case-law:
      endpoint: "https://object.storage.eu01.onstackit.cloud"
      bucket-name: caselaw
      access-key-id:
      secret-access-key:
      versionPrefix:
    literature:
      endpoint: "https://object.storage.eu01.onstackit.cloud"
      bucket-name: literature
      access-key-id:
      secret-access-key:
      versionPrefix:
    administrative-directive:
      endpoint: "https://object.storage.eu01.onstackit.cloud"
      bucket-name: administrative-directive
      access-key-id:
      secret-access-key:
      versionPrefix:
    portal:
      endpoint: "https://object.storage.eu01.onstackit.cloud"
      bucket-name: portal
      access-key-id:
      secret-access-key:
    public-files:
      endpoint: "https://object.storage.eu01.onstackit.cloud"
      bucket-name: public
      access-key-id:
      secret-access-key:

local:
  file-storage: backend/.local-storage

sentry:
  release: "${SENTRY_RELEASE:default_release}"
  environment: "${SENTRY_ENVIRONMENT:}"

app:
  security:
    csp-header: "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src data: 'self'; connect-src 'self'; font-src 'self'; frame-src 'none'; object-src 'none'; media-src 'none';"

