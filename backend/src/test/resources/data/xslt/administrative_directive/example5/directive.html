<!DOCTYPE HTML>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>Titel einer Verwaltungsvorschrift</title>
</head>
  <body>
    <h1>Titel einer Verwaltungsvorschrift</h1>
    <section id="kurzreferat">
      <h2>Kurzreferat</h2>
      <div>
        <p>Vorschrift Text</p>
      </div>
    </section>
    <section id="inhalt">
      <h2>Inhalt</h2>
      <ul>
        <li>1. Foo</li>
      </ul>
    </section>
    <section id="verweise">
      <h2>Verweise</h2>
      <ul>
        <li>Verweis 123A</li>
        <li>Verweis 567B Section 1 § 9</li>
        <li>Verweis 890C Section B § 4 Abs. 1 8</li>
      </ul>
    </section>
  </body>
</html>
