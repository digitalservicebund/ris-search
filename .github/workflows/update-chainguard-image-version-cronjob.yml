name: Update-Chainguard-Image-Version-Cronjob
on:
  schedule:
    - cron: '0 18 * * 0' # Runs at 6:00pm UTC (7 winter time/8 summer time in Germany) on Sundays
  # Allow manual workflow trigger
  workflow_dispatch:

jobs:
  update-chainguard-image-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
        - name: Bump chainguard/jre image
          uses: digitalservicebund/bump-chainguard-digest@937cc7a12750bfd06419f32cabcaa79a37f32705 # v1.1.3
          with:
            image_name: cgr.dev/chainguard/jre
            file_path: backend/Dockerfile.prod
            github_token: ${{ github.token }}