name: Scan-Attest-and-Sign-Images-Cronjob
on:
  schedule:
    - cron: '0 3 * * 1,3' # Runs at 3:00am UTC (4 winter time/5 summertime in Germany) on Mondays and Wednesdays
    - cron: '37 9 * * 4' # TODO: remove after final test run

jobs:
  resolve-image-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    env:
      FRONTEND_IMAGE_REFERENCE_BY_TAG: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
      BACKEND_IMAGE_REFERENCE_BY_TAG: ghcr.io/${{ github.repository }}:${{ github.sha }}
    outputs:
      frontend-image-digest: ${{ steps.resolve-tags.outputs.frontend-image-digest }}
      backend-image-digest: ${{ steps.resolve-tags.outputs.backend-image-digest }}
    steps:
      # Attestation and signing should be done on the actual image digest and
      # not a tag (because the image "behind" a can change). Therefore we need to
      # resolve the current image by tag to get a digest.
      - name: Resolve Digests
        id: resolve-tags
        run: |
          # Force the step to fail if any command fails
          set -eo pipefail
    
          FRONTEND_IMAGE_DIGEST=$(docker buildx imagetools inspect ${{ env.FRONTEND_IMAGE_REFERENCE_BY_TAG }} --format "{{json .Manifest.Digest}}" | tr -d '"')
          echo "frontend-image-digest=$FRONTEND_IMAGE_DIGEST" >> $GITHUB_OUTPUT
          
          BACKEND_IMAGE_DIGEST=$(docker buildx imagetools inspect ${{ env.BACKEND_IMAGE_REFERENCE_BY_TAG }} --format "{{json .Manifest.Digest}}" | tr -d '"')
          echo "backend-image-digest=$BACKEND_IMAGE_DIGEST" >> $GITHUB_OUTPUT

      - name: Send status to Slack
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        uses: digitalservicebund/notify-on-failure-gha@868884a79c05c62cab52b4f79832cc3589c91a12
        with:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  scan-attest-and-sign-frontend-image:
    needs: resolve-image-tags
    uses: ./.github/workflows/scan-attest-sign-image.yml
    secrets: inherit
    with:
      image-reference: ghcr.io/${{ github.repository }}/frontend@${{ needs.resolve-image-tags.outputs.frontend-image-digest }}
      app: frontend

  scan-attest-and-sign-backend-image:
    needs: resolve-image-tags
    uses: ./.github/workflows/scan-attest-sign-image.yml
    secrets: inherit
    with:
      image-reference: ghcr.io/${{ github.repository }}@${{ needs.resolve-image-tags.outputs.backend-image-digest }}
      app: backend
      trivy-db-repository: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
      trivy-java-db-repository: ghcr.io/aquasecurity/trivy-java-db,public.ecr.aws/aquasecurity/trivy-java-db
      trivy-offile-scan: true