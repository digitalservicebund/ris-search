name: CI-CD-Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - 'api-docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'api-docs/**'
  schedule:
    # This ensures that the applications container image is built, signed and deployed regularly.
    - cron: '0 8 * * 1,3' # Runs at 8:00am UTC (9am winter time/10am summer time in Germany) on Mondays and Wednesdays
  # Allow to run this workflow manually
  workflow_dispatch:

# On non-main branches, runs for the same workflow+ref share a concurrency group,
# so a newer run cancels any still-running older one (cancel-in-progress: true).
# On main, each run gets a unique group (run_id) so runs never cancel each other.
# github.workflow is included in the group key so two different workflows triggered
# by the same ref (e.g. this pipeline and the api-docs pipeline) don't cancel each other.
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && github.run_id || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read # SonarQube PR decoration
  packages: write # Push images in build-and-push-image and scan-attest-sign-image
  id-token: write # Sigstore/Fulcio identity challenge in build-and-push-image and scan-attest-sign-image
  security-events: write # Upload Trivy SARIF results in scan-attest-sign-image

env:
  RUN_ID: ${{ github.run_id }}

jobs:
  e2e-tests:
    uses: ./.github/workflows/pipeline-e2e.yml
    secrets: inherit

  backend-jobs:
    uses: ./.github/workflows/backend.yml
    secrets: inherit
    with:
      container-registry: ghcr.io
      image-reference: ghcr.io/${{ github.repository }}:${{ github.sha }}

  frontend-jobs:
    uses: ./.github/workflows/frontend.yml
    secrets: inherit
    with:
      container-registry: ghcr.io
      image-reference: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy-staging:
    needs:
      - backend-jobs
      - frontend-jobs
      - e2e-tests
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: staging

  smoke-tests:
    needs:
      - deploy-staging
    uses: ./.github/workflows/smoke-tests.yml
    secrets: inherit

