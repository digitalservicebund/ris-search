name: CI-CD-Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow to run this workflow manually
  workflow_dispatch:

env:
  RUN_ID: ${{ github.run_id }}

jobs:
  e2e-tests:
    uses: ./.github/workflows/pipeline-e2e.yml
    secrets: inherit

  backend-jobs:
    uses: ./.github/workflows/backend.yml
    secrets: inherit
    with:
      container-registry: ghcr.io
      image-reference: ghcr.io/${{ github.repository }}:${{ github.sha }}

  frontend-jobs:
    uses: ./.github/workflows/frontend.yml
    secrets: inherit
    with:
      container-registry: ghcr.io
      image-reference: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  ### Deploy Staging ###
  deploy-staging:
    needs:
      - backend-jobs
      - frontend-jobs
      - e2e-tests
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: staging

  ### Smoke tests ###
  smoke-tests:
    needs:
      - deploy-staging
    uses: ./.github/workflows/smoke-tests.yml
    secrets: inherit

  ### Deploy UAT ###
  deploy-uat:
    needs:
      - smoke-tests
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: uat

  ### Deploy Prototype ###
  deploy-prototype-otc:
    needs:
      - deploy-uat
    uses: ./.github/workflows/deploy-otc.yml
    secrets: inherit
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: prototype
      argocd-app-name: ris-portal-prototype-production

  deploy-prototype:
    needs:
      - deploy-uat
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: prototype

  ### Deploy Production ###
  deploy-production:
    needs:
      - deploy-prototype
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: prod
      argocd-app-name: ris-search-production