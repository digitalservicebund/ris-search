name: CI-CD-Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - 'api-docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'api-docs/**'
  schedule:
    # This ensures that the applications container image is built, signed and deployed regularly.
    - cron: '0 8 * * 1,3' # Runs at 8:00am UTC (9am winter time/10am summer time in Germany) on Mondays and Wednesdays
  # Allow to run this workflow manually
  workflow_dispatch:

# On non-main branches, runs for the same workflow+ref share a concurrency group,
# so a newer run cancels any still-running older one (cancel-in-progress: true).
# On main, each run gets a unique group (run_id) so runs never cancel each other.
# github.workflow is included in the group key so two different workflows triggered
# by the same ref (e.g. this pipeline and the api-docs pipeline) don't cancel each other.
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && github.run_id || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  RUN_ID: ${{ github.run_id }}

jobs:
  e2e-tests:
    uses: ./.github/workflows/pipeline-e2e.yml
    permissions:
      packages: read
      contents: read
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      REPORTS_BUCKET_ACCESS_KEY_ID: ${{ secrets.REPORTS_BUCKET_ACCESS_KEY_ID }}
      REPORTS_BUCKET_SECRET_ACCESS_KEY: ${{ secrets.REPORTS_BUCKET_SECRET_ACCESS_KEY }}

  backend-jobs:
    uses: ./.github/workflows/backend.yml
    permissions:
      contents: read
      pull-requests: read
      packages: write
      id-token: write
      security-events: write
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      REPORTS_BUCKET_ACCESS_KEY_ID: ${{ secrets.REPORTS_BUCKET_ACCESS_KEY_ID }}
      REPORTS_BUCKET_SECRET_ACCESS_KEY: ${{ secrets.REPORTS_BUCKET_SECRET_ACCESS_KEY }}
    with:
      container-registry: ghcr.io
      image-reference: ghcr.io/${{ github.repository }}:${{ github.sha }}

  frontend-jobs:
    uses: ./.github/workflows/frontend.yml
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    with:
      container-registry: ghcr.io
      image-reference: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy-staging:
    needs:
      - backend-jobs
      - frontend-jobs
      - e2e-tests
    uses: ./.github/workflows/deploy.yml
    secrets:
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      ARGOCD_SERVER_STACKIT: ${{ secrets.ARGOCD_SERVER_STACKIT }}
      GITOPS_NEURIS_APP_ID: ${{ secrets.GITOPS_NEURIS_APP_ID }}
      GITOPS_NEURIS_APP_PRIVATE_KEY: ${{ secrets.GITOPS_NEURIS_APP_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: staging

  smoke-tests:
    needs:
      - deploy-staging
    uses: ./.github/workflows/smoke-tests.yml
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      STAGING_BASIC_AUTH_PASSWORD: ${{ secrets.STAGING_BASIC_AUTH_PASSWORD }}
      STAGING_BASIC_AUTH_USERNAME: ${{ secrets.STAGING_BASIC_AUTH_USERNAME }}

  deploy-uat:
    needs:
      - smoke-tests
    uses: ./.github/workflows/deploy.yml
    secrets:
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      ARGOCD_SERVER_STACKIT: ${{ secrets.ARGOCD_SERVER_STACKIT }}
      GITOPS_NEURIS_APP_ID: ${{ secrets.GITOPS_NEURIS_APP_ID }}
      GITOPS_NEURIS_APP_PRIVATE_KEY: ${{ secrets.GITOPS_NEURIS_APP_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: uat

  deploy-prototype:
    needs:
      - deploy-uat
    uses: ./.github/workflows/deploy.yml
    secrets:
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      ARGOCD_SERVER_STACKIT: ${{ secrets.ARGOCD_SERVER_STACKIT }}
      GITOPS_NEURIS_APP_ID: ${{ secrets.GITOPS_NEURIS_APP_ID }}
      GITOPS_NEURIS_APP_PRIVATE_KEY: ${{ secrets.GITOPS_NEURIS_APP_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: prototype

  deploy-production:
    needs:
      - deploy-prototype
    uses: ./.github/workflows/deploy.yml
    secrets:
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      ARGOCD_SERVER_STACKIT: ${{ secrets.ARGOCD_SERVER_STACKIT }}
      GITOPS_NEURIS_APP_ID: ${{ secrets.GITOPS_NEURIS_APP_ID }}
      GITOPS_NEURIS_APP_PRIVATE_KEY: ${{ secrets.GITOPS_NEURIS_APP_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: prod
      argocd-app-name: ris-search-production
