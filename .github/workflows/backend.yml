# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Backend

on:
  workflow_call:
    inputs:
      image-reference:
        description: 'The full image reference (registry/repo:tag) for the backend image'
        required: true
        type: string
      container-registry:
        description: 'Name of the container registry'
        required: false
        type: string
        default: ghcr.io

env:
  RUN_ID: ${{ github.run_id }}

  TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
  TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db,public.ecr.aws/aquasecurity/trivy-java-db

  GH_PACKAGES_REPOSITORY_USER: ${{ github.actor }}
  GH_PACKAGES_REPOSITORY_TOKEN: ${{ github.token }}

permissions:
  contents: read
  pull-requests: read # Required by backend-tests-and-code-quality job (SonarQube PR decoration)
  packages: write # Required by build-and-push-image job and scan-attest-sign-image
  id-token: write # Required by build-and-push-image job and scan-attest-sign-image
  security-events: write # Required by scan-attest-sign-image

jobs:
  validate-gradle-wrapper:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 #v6.2.0

      - name: Send status to Slack
        uses: digitalservicebund/notify-on-failure-gha@671832f192aee0a068fd92b2f6deb975df794a84 # v1.6.1
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.NEURIS_PORTAL_ALERTS_SLACK_CHANNEL_ID }}

  check-source-code-formatting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: validate-gradle-wrapper
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: "21.0"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: ./backend
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: ./backend
        run: ./gradlew spotlessCheck

      - name: Send status to Slack
        uses: digitalservicebund/notify-on-failure-gha@671832f192aee0a068fd92b2f6deb975df794a84 # v1.6.1
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.NEURIS_PORTAL_ALERTS_SLACK_CHANNEL_ID }}

  audit-licenses:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: validate-gradle-wrapper
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: "21.0"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: ./backend
        run: chmod +x gradlew

      - name: Run license scanner
        working-directory: ./backend
        run: ./gradlew checkLicense

      - name: Send status to Slack
        uses: digitalservicebund/notify-on-failure-gha@671832f192aee0a068fd92b2f6deb975df794a84 # v1.6.1
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.NEURIS_PORTAL_ALERTS_SLACK_CHANNEL_ID }}

  backend-tests-and-code-quality:
    name: Backend tests and code quality checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # SonarQube uses GITHUB_TOKEN to read PR information for analysis decoration
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: "21.0"
          distribution: "temurin"
          cache: gradle

      - name: Cache SonarQube packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Grant execute permission for gradlew
        working-directory: ./backend
        run: chmod +x gradlew

      - name: Run Tests and Scan with SonarQube
        if: ${{ github.actor != 'dependabot[bot]' }}
        id: sonarqube-tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: ./backend
        # Running sonar includes unit and integration test
        run: ./gradlew sonar

      - name: Check SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        if: ${{ github.actor != 'dependabot[bot]' }}
        with:
          scanMetadataReportFile: backend/build/sonar/report-task.txt
        timeout-minutes: 3 # Force to fail step after specific time
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

        # Dependabot does not have access to org tokens like SONAR_TOKEN
        # thus run the tests without sonar in dependabot PRs
      - name: Run unit and integration tests
        if: ${{ github.actor == 'dependabot[bot]' }}
        working-directory: ./backend
        run: ./gradlew integrationTest

      - name: Send status to Slack
        uses: digitalservicebund/notify-on-failure-gha@671832f192aee0a068fd92b2f6deb975df794a84 # v1.6.1
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.NEURIS_PORTAL_ALERTS_SLACK_CHANNEL_ID }}

  build-and-push-image:
    runs-on: ubuntu-latest
    needs:
      - validate-gradle-wrapper
      - check-source-code-formatting
      - audit-licenses
      - backend-tests-and-code-quality
    permissions:
      contents: read
      id-token: write # This is used to complete the identity challenge with sigstore/fulcio..
      packages: write
    outputs:
      image-digest: ${{ steps.build-push-image.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: "21.0"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: ./backend
        run: chmod +x gradlew

      - name: Log into container registry
        # Third-party action, pin to commit SHA!
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ inputs.container-registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build backend image
        id: build-push-image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        # Note: We set the sentry release to the current commit sha so it is baked into the docker image
        # and supplied to the backend application at runtime so it can associate errors with the correct sentry release.
        # There is no need to create a sentry release in the backend pipeline as we already create one in the frontend pipeline
        # and the applications live a monorepo and we only have a single sentry project for both frontend & backend.
        with:
          file: backend/Dockerfile.prod
          context: backend
          tags: ${{ inputs.image-reference }}
          push: true
          secrets: |
            GH_PACKAGES_REPOSITORY_USER=${{ github.actor }}
            GH_PACKAGES_REPOSITORY_TOKEN=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            SENTRY_RELEASE=${{ github.sha }}
      - name: Send status to Slack
        uses: digitalservicebund/notify-on-failure-gha@671832f192aee0a068fd92b2f6deb975df794a84 # v1.6.1
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.NEURIS_PORTAL_ALERTS_SLACK_CHANNEL_ID }}

  scan-attest-and-sign-image:
    needs: build-and-push-image
    uses: ./.github/workflows/scan-attest-sign-image.yml
    secrets: inherit
    with:
      # Use image digest instead of tag to uniquely identify the image
      image-reference: ${{ inputs.container-registry}}/${{ github.repository }}@${{ needs.build-and-push-image.outputs.image-digest }}
      app: backend
      trivy-db-repository: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
      trivy-java-db-repository: ghcr.io/aquasecurity/trivy-java-db,public.ecr.aws/aquasecurity/trivy-java-db
      trivy-offile-scan: true

  generate-backend-code-documentation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: "21.0"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: ./backend
        run: chmod +x gradlew

      - name: Run Javadoc
        working-directory: ./backend
        run: ./gradlew javadoc

      - name: Upload documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: backend-code-documentation
          retention-days: 3
          path: backend/build/docs/javadoc/

      - name: Send status to Slack
        uses: digitalservicebund/notify-on-failure-gha@671832f192aee0a068fd92b2f6deb975df794a84 # v1.6.1
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.NEURIS_PORTAL_ALERTS_SLACK_CHANNEL_ID }}

  push-reports:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - generate-backend-code-documentation
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Backend Code Documentation - Download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: backend-code-documentation
          path: tmp/backend-code-documentation/

      - name: Upload code documentation to ris-reports
        uses: digitalservicebund/add-ris-report@5980f8dc97ec0aea58656e79e391eea59a9dfea8
        with:
          filePath: tmp/backend-code-documentation
          destinationDir: search-code-documentation/java
          reportIsDirectory: true
          BUCKET_ACCESS_KEY_ID: ${{ secrets.REPORTS_BUCKET_ACCESS_KEY_ID }}
          BUCKET_SECRET_ACCESS_KEY: ${{ secrets.REPORTS_BUCKET_SECRET_ACCESS_KEY }}

      - name: Send status to Slack
        uses: digitalservicebund/notify-on-failure-gha@671832f192aee0a068fd92b2f6deb975df794a84 # v1.6.1
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.NEURIS_PORTAL_ALERTS_SLACK_CHANNEL_ID }}
