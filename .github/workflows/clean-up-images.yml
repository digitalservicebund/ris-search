name: Clean up old images

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  clean:
    runs-on: ubuntu-latest
    name: Delete old images
    permissions:
      packages: write
    steps:
      - uses: snok/container-retention-policy@d3bdcf5ce9b05f685154e4a16c39233b245e3d53 # v3.1.0
        with:
          account: digitalservicebund
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: "ris-search ris-search/frontend ris-search/public-frontend ris-search/internal-frontend"
          cut-off: 4w
          keep-n-most-recent: '5'
          dry-run: false