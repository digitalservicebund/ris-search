name: "CI-CD-Pipeline for Api-Docs"

on:
  push:
    branches: [main]
    paths:
      - "api-docs/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "api-docs/**"
      - ".github/workflows/**"
  schedule:
    # This ensures that the applications container image is built, signed and deployed regularly.
    - cron: "0 8 * * 1,3" # Runs at 8:00am UTC (9am winter time/10am summer time in Germany) on Mondays and Wednesdays
  # Allow to run this workflow manually
  workflow_dispatch:

env:
  API_DOCS_ROOT: ./api-docs

# On non-main branches, runs for the same workflow+ref share a concurrency group,
# so a newer run cancels any still-running older one (cancel-in-progress: true).
# On main, each run gets a unique group (run_id) so runs never cancel each other.
# github.workflow is included in the group key so two different workflows triggered
# by the same ref (e.g. this pipeline and the main pipeline) don't cancel each other.
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && github.run_id || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write # Required by build-and-push-image job and scan-attest-sign-image
  id-token: write # Required by scan-attest-sign-image (cosign attest/sign)
  security-events: write # Required by scan-attest-sign-image (upload Trivy SARIF to Security tab)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          package_json_file: ${{ env.API_DOCS_ROOT }}/package.json

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: ${{ env.API_DOCS_ROOT }}/pnpm-lock.yaml

      - name: Install Node modules
        run: pnpm ci
        working-directory: ${{ env.API_DOCS_ROOT }}

      - name: Build
        run: pnpm build
        working-directory: ${{ env.API_DOCS_ROOT }}

      - name: Send failure to Slack
        uses: digitalservicebund/notify-on-failure-gha@8570032b46ae9c2b976ec41567f595746fa44b4e # v1.6.1
        if: ${{ failure() && github.event_name != 'pull_request' }}
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.NEURIS_PORTAL_ALERTS_SLACK_CHANNEL_ID }}

  build-and-push-image:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      packages: write
      contents: read
    outputs:
      image-digest: ${{ steps.docker-build-push.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log into container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build api-docs image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: docker-build-push
        with:
          file: ${{ env.API_DOCS_ROOT }}/Dockerfile
          context: ${{ env.API_DOCS_ROOT }}
          tags: ghcr.io/${{ github.repository }}/api-docs:${{ github.sha }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Send status to Slack
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        uses: digitalservicebund/notify-on-failure-gha@671832f192aee0a068fd92b2f6deb975df794a84 # v1.6.1
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.NEURIS_PORTAL_ALERTS_SLACK_CHANNEL_ID }}

  scan-attest-and-sign-image:
    needs: build-and-push-image
    uses: ./.github/workflows/scan-attest-sign-image.yml
    secrets: inherit
    with:
      # Use image digest instead of tag to uniquely identify the image
      image-reference: ghcr.io/${{ github.repository }}/api-docs@${{ needs.build-and-push-image.outputs.image-digest }}
      app: api-docs

  deploy:
    needs:
      - scan-attest-and-sign-image
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image-tag: ${{ github.sha }}
      deployment-environment: prototype
      deploying-apps: "ris-search/api-docs"
