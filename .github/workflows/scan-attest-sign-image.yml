name: Scan-Attest-and-Sign-Image

on:
  workflow_call:
    secrets:
      SLACK_BOT_TOKEN:
        required: true
    inputs:
      image-reference:
        description: 'The full image reference (registry/repo:tag) of the image to scan and attest'
        required: true
        type: string
      app:
        description: 'App for which the scan and attestation is run, Either "frontend" or "backend"'
        required: true
        type: string
      container-registry:
        description: "Name of the container registry"
        required: false
        type: string
        default: ghcr.io
      trivy-db-repository:
        required: false
        type: string
      trivy-java-db-repository:
        required: false
        type: string
      trivy-offile-scan:
        required: false
        type: boolean

permissions:
  contents: read

jobs:
  scan-attest-sign-image:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: write
      id-token: write
      contents: read
    env:
      TRIVY_DB_REPOSITORY: ${{ inputs.trivy-db-repository }}
      TRIVY_JAVA_DB_REPOSITORY: ${{ inputs.trivy-java-db-repository }}
      TRIVY_OFFLINE_SCAN: ${{ inputs.trivy-offile-scan }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Log into container registry
        # Third-party action, pin to commit SHA!
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ inputs.container-registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Trivy vulnerability image scanner
       # Third-party action, pin to commit SHA!
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
         image-ref: ${{ inputs.image-reference }}
         format: "sarif"
         output: "trivy-results.sarif"
         trivyignores: ${{ inputs.app}}/.trivyignore

      - name: Upload Trivy vulnerability image scanner results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
         name: "trivy-scan-results-${{ inputs.app }}.sarif"
         path: "trivy-results.sarif"
         if-no-files-found: error

      - name: Upload Trivy image scan results to GitHub Security tab (on 'main' only)
        uses: github/codeql-action/upload-sarif@cf463419fdde78c727231e445622a9ac37966f84 # v4
        if: ${{ always() &&  github.ref == 'refs/heads/main' }} # Bypass non-zero exit code..
        with:
         sarif_file: "trivy-results.sarif"
         category: trivy-${{ inputs.app }}-image-scan

      - name: Check Trivy results
        run: |
         if grep -qE 'HIGH|CRITICAL' trivy-results.sarif; then
           echo "Vulnerabilities found"
           echo "### Found vulnerabilities in trivy results" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           RESULT=$(cat trivy-results.sarif | jq -r '[.runs[].results[].message.text] | join("\\n\\n")')
           echo -e $RESULT >> $GITHUB_STEP_SUMMARY
           echo -e $RESULT
           exit 1
         else
           echo "No significant vulnerabilities found"
           exit 0
         fi

      - name: Generate Cosign vulnerability scan record
        # Third-party action, pin to commit SHA!
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
        with:
         image-ref: ${{ inputs.image-reference }}
         format: "cosign-vuln"
         output: "vuln-${{ inputs.app }}.json"

      - name: Upload Cosign vulnerability scan record as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
        with:
         name: "vuln-${{ inputs.app }}.json"
         path: "vuln-${{ inputs.app }}.json"
         if-no-files-found: error

      - name: Install Cosign
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
         cosign-release: "v2.6.0" # We need to use v2.X.X because of major version GHA v4.X.X and broken image verification of Kyverno

      - name: Attest vulnerability scan
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
        run: cosign attest --yes --replace --predicate "vuln-${INPUTS_APP}.json" --type vuln ${INPUTS_IMAGE_REFERENCE}
        env:
          INPUTS_APP: ${{ inputs.app }}
          INPUTS_IMAGE_REFERENCE: ${{ inputs.image-reference }}

      - name: Sign the published image
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
        run: cosign sign --yes ${INPUTS_IMAGE_REFERENCE}
        env:
          INPUTS_IMAGE_REFERENCE: ${{ inputs.image-reference }}

      - name: Send status to Slack
        if: ${{ failure() && github.ref == 'refs/heads/main' }}
        uses: digitalservicebund/notify-on-failure-gha@671832f192aee0a068fd92b2f6deb975df794a84 # v1.6.1
        with:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.NEURIS_PORTAL_ALERTS_SLACK_CHANNEL_ID }}
